body:
  text: 唐大總持寺沙門智通譯如是我聞一時薄伽梵住極樂世界爾時觀世音菩薩摩訶薩往詣佛所白佛言世尊我有隨心自在心王陀羅尼能為未來一切衆生作大利益世尊若有苾芻苾芻尼塢波塞迦塢波斯迦受持此陀羅尼者速能成就三摩地門速能成就諸陀羅尼門無量無邊世界業障悉令清淨無量無邊福德資糧積集善根增長能生無量無邊智慧神通境界能超過入方便善增六波羅蜜滿足增長一切菩薩力無所畏十八不共羅漢聖諦神足根力覺道得定緣解脫三昧三摩鉢底能令見者聲聞緣覺證於佛地所修智慧威德力成就聰明福德吉祥勤精進經行乃至辨才具足騰空隱形自在持呪仙位世樂具足多財富貴賢瓶如意安善那成就療一切病痛鬼魅悉能除遣災疫消滅能成一切善事能滅一切罪障善能成就無量無邊陀羅尼三昧獲最勝廣大法要即説陀羅尼曰曩上聲謨囉怛那二合哆囉二合野引耶一曩上聲謨阿引唎耶二嚩嚧枳帝濕嚩二合引囉耶三地薩怛嚩二合引耶四摩訶薩怛嚩二合引耶五摩訶迦嚧尼迦引耶六怛儞也他二合七唵多唎多唎咄多唎八咄咄哆唎咄唎九娑嚩二合訶十世尊此陀羅尼法常為一切天龍夜叉乾闥婆阿蘇囉迦樓羅緊那羅部多那畢舍多俱槃荼羅剎娑七耀諸苾達那毗那夜迦等之所供養吉祥讚歎禮拜常為梵護世諸仙衆成就陀羅尼仙供養隨喜信受加持獲得梵行清淨稱讚恭敬尊重供養一切承事之具悉令滿足爾時觀世音菩薩復説受持之法若有受持此陀羅尼者應當洗浴清淨著新淨衣并受律儀住於慈心以大悲意樂真實語除於貪吝於一切衆生生利益心安樂勝意捨瞋欲心常當念誦勿令斷絶作廣大供養觀自在菩薩像前散華末香華鬘塗香幢幡寶蓋莊嚴於菩薩像前一心堅固至意信向觀自在多唎隨心陀羅尼每日誦一千八遍不令斷絶滿三十萬遍已一切所為之事皆得成就功德積集不被水火焚漂一切惡毒不能侵害若為四衆説法皆須燒香誦此真言七遍能令所説通利無有障礙辨才無畏又令一切天魔外道一切厭魅呪詛等事不能為害壽命延長所有願求隨心所獲修真言者應當如是一一依前每入道場當於像前結跏趺坐以作加持結蓮華根本印誦前真言隨情梵音而以供養音聲調和如從本尊口中流出入行人身中於其座前當觀有大蓮華華上想有覩龍二合字其字變成青蓮華乃至變成多利菩薩種種莊嚴寶冠上有觀自在王如來左持青蓮華當於心上右施諸願無畏念誦之時應當如是觀其本尊真言字於淨月中右旋如髻猶水精珠列在明鏡光徹表裏分明聲等搖鈴勿今斷絶不緩不急才令自聞氣息調安詳審記如是滿三十萬遍已即得成就諸願如意爾時觀自在菩薩即於夢中示現以比丘身或婆羅門身或童男童女身或現國王身或現大臣身或現長者居士等身讚言善哉善哉大士汝已能攝護於教法汝所願成就更何所求是時行者所須之願應當具説即得成就一切吉祥果報印法第二總攝身印第一以二手中指無名指小指各向外相叉合掌右壓左頭指博著掌背二大指並竪博相著呪曰誦前呪七遍隨心所作皆得成就召請印第二以右手向前把左手腕於頭上以左手四指來去真言曰唵薩婆菩提薩埵嚩耶移醯堙醯娑嚩訶此真言印燒安悉香誦七遍請菩薩即來於後若欲誦多利心真言先作此法蓮華臺印第三以二手相合仰掌向上指各微屈如開敷蓮華形即誦真言曰唵薩婆跛囉鼻瑟吒二合菩陀那娑嚩二合訶此真言印能令無量菩薩皆來集會香印第四以右手大指捻無名指甲上餘三指直屈又以左手附下真言曰唵薩婆跛耶布瑟婆伽耶娑嚩二合訶此真言印能感得天龍八部皆來供養香水印第五以兩手中指無名指小指各把大指如拳法合腕以二頭指相拄誦真言曰唵薩婆烏馱迦耶羅闍娑嚩二合訶此真言印法供養恆沙諸佛菩薩護身印真言第六先合掌屈二小指甲相背二大指附二頭指三指合頭相拄掌中開少許當於頂上頭指來去真言曰唵阿唎多唎都多唎覩唎呬囒拏夜揭囉鞞囉叉囉叉茫薩婆突弊也二合薩蒲跛達囉鞞弊也二合娑嚩二合訶此真言印誦滿十萬遍降伏一切蠱道除一切諸魔外道等輩不能為害并用護身又作此印誦前心真言於舍利塔前至心發露懺悔衆罪消滅口印真言第七準前心印唯改二大指屈入掌中並壓二小指節上真言曰唵毗婆施伽伽那娑嚩二合訶此真言印已口誦真言時除口業罪障大懺悔印真言第八先以右手大指捻中指甲上餘三指直舒左手亦然以右手大指甲壓左手大指上正當心前真言曰唵薩婆菩陀地薩哆嚩耶娑嚩二合訶此真言印懺悔能除一切業障等罪悉皆消滅追喚一切大力鬼神天龍八部印第九以右手捺左手背上四指向下相叉以右手四指來去真言曰唵俱嚕陀薩婆提婆耶娑嚩二合訶大結界辟除頻那夜迦印真言第十以右手無名指叉入左手無名指背上右手大指鉤取左手小指在左手掌中壓左頭指及中指無名指甲上以右手頭指與左手小指頭相拄右手大指壓左中指背上捩右腕真言曰唵薩婆藥乞叉二合囉唎娑那盤陀盤陀陀娑訶隨心印真言第十一準前結界印唯改右手頭指與左手小指相去七寸許作此印者誦前隨心真言所願皆得度魔王波旬入道印第十二以右手中指無名指相著屈在掌中直竪餘三指舒手掌向胸左手亦然以掌向外託作此印時波旬領諸徒衆悉慕入道頂禮其足誦前本心真言降伏外道六師印第十三準前印唯改大指捻無名指及中指甲上作此印時六師歸伏亦誦本真言菩薩五眼清淨真言印第十四以兩手大指二頭指相捻二中指並竪頭相拄二無名指壓二小指甲上中間使當額上著真言曰唵薩婆斫者芻陀羅伽囉耶娑嚩二合訶作此真言印時得見六道衆生離苦解脫施甘露印第十五以左手頭指與大指相捻餘三指直竪向外託又以右手垂向下直舒五指此施甘露法六道衆生悉皆飽滿解脫亦誦本真言防難印第十六以右手大指叉右肋指頭向後餘四指把拳左手亦然向前怒臂作此印已真言曰唵薩婆塗瑟吒二合耶瞋陀瞋陀娑嚩二合訶自在印真言第十七以左右手四指反相叉又以二頭指相拄二大指相去直向上直竪真言曰唵薩婆菩陀跢囉耶摩囉耶娑嚩二合訶三昧印第十八正坐跏趺以左手掌承右手背相壓當心前誦前心真言即得能入滅盡禪定三昧召焰摩天王印第十九以二小指反相鉤右壓左屈二中指二無名指各壓二大指甲上竪二頭指相去五寸頭指來去真言曰唵薩婆焰摩囉閻第毗耶娑嚩二合訶作此真言印時欲知罪人數量多少問其姓名王自將領諸官從空而來具報行人召四天王印真言第二十以二手四指反相叉二大指屈入掌中令藏指頭頭指來去真言曰唵薩婆提弟婆羯囉訶那娑嚩二合訶作此印時四天大王一時俱至行人問四天下事悉皆知之清淨持戒印第二十一以右膝著地舉頭向上合掌當心又以二頭指壓中指背上第一節二大指各附二頭指側真言曰唵薩婆波羅提藥乞叉二合呬㗚二合陀那婆嚩二合訶作此印真言之時無量無邊世界一切衆生之類得清淨戒隨身隱形入道印真言第二十二以右手大指壓無名指中指壓上頭指及小指直竪左手亦然以左大指從下向上入右掌中鉤取左手中指無名指右壓左真言曰唵俱唎夜底薩婆迦唎耶娑嚩二合訶喚五道等仙人印第二十三以兩手中指無名指小指各把拳兩手相合二大指各附中指側頭指來去真言曰唵薩婆訖唎二合多知耶二合羯摩婆耶瞿跢曳娑嚩二合訶作此印真言時一切仙人呼喚並至問其仙人法事一一具陳灌頂清淨印真言第二十四準前五道印上唯改二頭指各壓二大指頭頭指相拄又以二中指直竪頭相拄向頂上著真言曰唵提健婆慕哆囉僧建娑嚩二合訶若作大曼荼羅道場時以此印誦真言灌頂無邊衆生皆得清淨水難印第二十五以兩手中指無名指相叉右壓左二頭指及二小指直竪頭相拄二大指屈入掌真言曰唵烏陀伽薩婆第婆烏陀伽娑嚩二合訶作此印真言法水不能漂諸天歸伏火難印第二十六準前水印唯改二頭指小指各相去一寸許真言同前水難真言能令火不能燒諸天歸伏風難印第二十七以右手中指無名指叉入左手無名指背上二頭指小指隨入壓左手無名指及中指心上左手頭指及小指壓右手中指無名指背上出二大指相去直竪反掌向外用水難真言作此印真言時一切風難不能為害風雨神王悉皆歸伏天印第二十八以右手大指捻左手頭指第二節又以左手大指捻右手大指第一節餘三指竪頭指相拄各相去一寸許用前隨心真言作此印真言時能見三十三天上事地印第二十九準前天印唯改以二無名指平屈頭指相拄真言曰唵佉吒旁伽賀悉跢曳娑嚩二合訶作此印真言時一切地神皆悉歸伏賊難印真言第三十以右手頭指中指無名指小指反鉤左手四指二大指各散直竪真言曰唵薩婆圖瑟吒二合跛囉圖瑟吒二合那瞋陀耶娑嚩二合訶作此印真言一切賊難皆悉自縛不能為害王難印第三十一準前賊難印唯改右手大指鉤取左手大指即是真言曰唵薩婆囉闍度瑟吒二合那娑嚩二合訶作此印法時一切王難刀兵等難不能為害施無畏印第三十二起立以左臂直舒向下五指亦舒向下掌背向後右手亦然以掌向前如施甘露右手印法真言曰跢姪他阿唎跢唎覩跢唎覩唎醯蘭拏夜伽囉鞞囉叉囉叉薩婆耨契毗耶薩般達囉鞞毗耶娑嚩二合訶作此印真言誦十萬遍一切衆生皆得無畏防毒難印真言第三十三以兩手四指反相叉二大指頭相拄反掌向外真言曰唵跛囉伽舍夜延盤陀盤陀娑嚩二合訶若入山谷作此印時一切毒蛇虎狼師子諸毒禽獸不能傷害一切毒藥亦不能害求聰明印真言第三十四以兩手大指各捻二無名指甲上二小指並直竪搏二中指側頭相拄屈二頭指各附二中指側第二文上指頭相去一寸許作此印已正當心前亦誦隨心真言若有鈍根者為作此印供養求願則得如願昔頗梨國有一長者家雖大富為性鈍根師為七日依法求願則得聰明日誦千偈自餘證驗不可具陳破地獄印第三十五以兩手二中指無名指各屈左掌中相背二大指頭指小指各相去半寸許亦誦前根本真言作此印時地獄門開受苦衆生一時解脫其焰摩王心生歡喜觀世音菩薩大慈大悲憐愍衆生故此法印求生淨土印第三十六合掌當心以二大指並拄心上誦根本真言作此印時為彼一切諸衆生等臨命終時作此法印一心誦真言隨欲樂生何佛國土隨意往生救一切病苦衆生印第三十七以二頭指與二中指相鉤右壓左二大指各屈在掌中二無名指及小指頭手掌向內誦前根本真言若有一切病苦衆生為作此印法無量衆生所有病苦皆悉除愈取地中伏藏印第三十八以兩手四指各反相叉在於掌中并二大指並向下拄地知有寶處作此印已誦根本真言一百八遍其七寶神一時俱至隨問而答求見觀世音印第三十九以二無名指及小指各反相叉右壓左二中指並直竪頭相拄二頭指各屈第二節及第三節兩甲相背二大指壓二頭指節上亦誦前根本真言作此印已至心誦真言專心正念爾時觀音菩薩剋當現身行人見已懺悔衆罪次求見佛見佛印第四十準前印上唯改以左手中指屈入右無名及頭指岐間右中指壓左中指背上真言曰跢姪他伊利多唎娑嚩二合訶若作此印誦真言滿十萬遍十方諸佛來問行人作何所為便與摩頂授記通師注云為病經三七日至求作此印法現蒙摩頂授記此事每不向人説唯自知耳後一切法皆得成就作此印時每有異香煙至若能專誠當得作佛不可思議世人聞此未能生信恐有生謗不欲流傳同修行人乃可知之亦誦根本真言隨心成就滿足六波羅蜜印第四十一當以兩手反合掌背相著捩腕向外二大指正當眉間向下垂真言曰跢姪他薩婆菩陀耶薩婆跛囉腎壤波羅弭多曳唵賀婆賀娑娑嚩二合訶作此印時起菩薩心普觀一切衆生類猶如赤子作是念已至心誦滿十萬遍由是法力一切衆生皆悉具足六波羅蜜所願滿足恆沙等一切世界諸佛世尊悉皆歡喜隨心具一切功德印第四十二左手大指屈入掌中餘四指把拳在右腋下右手亦然在左腋下右壓左誦根本真言作此印法時無量衆生悉皆具足一切功德隨心神足印第四十三右手中指無名指屈在掌中大指壓無名指中指甲上頭指小指直伸誦真言作此印已用摩兩手足日馳千里作此印時地神每將七寶華臺承行人足肉眼不見但生大悲救護之心莫為自求名聞利養必定感得萬神扶助誦根本真言隨心祈願印第四十四通後印用以右手大指屈而向掌又屈頭指離大指頭四五分許中指以下三指總伸相搏以印橫側著於心上指頭向右作此印已即誦根本真言若欲求願先作四肘水壇懸諸幢蓋種種莊嚴於其壇中著隨心像像前列諸供養誦前真言祈願成就隨心祈一切願印第四十五共同前右手大指屈向掌又屈頭指離大指頭四五分許中指總伸相搏以印橫側著於心上指頭向右作此印已誦根本真言此法印欲求願時先作縱廣四肘水壇懸諸幡蓋種種莊嚴於其壇中著隨心像當其像前列著四碗各盛一味石蜜沙糖乳蜜如是次第各盛供養散種種華燒沈水香供養像前至心懺悔隨心所願祈請竟像前作印以袈裟覆或用淨巾覆其印上已至心誦真言滿一百八遍更莫餘緣誦此真言竟隨心所願悉得稱意隨大小一日乃至七日作法日日三時晨朝日中及黃昏時依前法必果所願除不至心若非同心善知識請不流傳非其人殃及身又未入灌頂者亦不得傳隨心解一切鬼金剛等印第四十六以兩手反合掌背相著當心瞋怒誦前根本真言二七遍已急翻兩手正合掌已又誦七遍印散開之作此印法時能破一切諸法皆悉不成此印是觀世音成道降魔印非心行同大善知識請不流傳非其人殃其身又未入灌頂曼荼羅大法者亦不得傳觀世音菩薩印第四十七掘多三藏譯出印先以兩手相合十指頭齊兩腕相著正當心上合掌令掌心空誦根本真言總攝印第四十八兩手腕仰相叉右大指壓左大指兩手八指急怒把拳真言曰唵薩婆那庾多慕陀羅耶盤陀盤陀娑嚩二合訶此總攝印明悉能一切印法此是智通於玄奘三藏處受得此印五眼清淨真言唵薩婆斫芻陀羅伽囉耶娑嚩二合訶此無印每日旦起隨力供養於像前至心誦此真言滿十萬遍已去不假作餘法一切所求無不稱遂一切外法所有禁呪以此呪之皆散不成前三十萬遍此多羅真言法觀音聖者誓願力故假令身上有五逆重罪但能依法作之並得消滅若得一度作壇法受持得驗已後隨心誦三遍或一遍已皆得成驗觀世音説療一切病壇法壇方三尺中城方二尺內城方一尺皆須先掘去穢土即與淨土作之香汁泥令平淨掃以粉米種種雜綵色和作蓮華承觀音像最內院壇上四角安四天王座須方畫壇上作燒種種上妙好香沈水香請佛及菩薩并諸善神總了即散華訖復座誦真言一百八遍即須發願作善訖更起燒香繞壇三匝訖即更復座誦真言一百八遍滿一萬遍即起於南門側立真言鉢令轉即知驗初受持法用若往餘處治病隨心念想作也能作壇最勝治病速驗又法若作惡家取死人腳脛骨削作兩把橛呪一千八遍著怨家門底三日怨家自去拔橛却還不拔橛不還於佛法作障難調伏者請三寶力入佛道也若欲得遠相去離者當取苦楝子呪一遍投著水中如是滿一百八遍日別三時滿七日已即各相離不相侵犯若人為惡欲令相去如是作法稱彼名又法取石子四枚隨其大小可呪七遍安四方則一切盜賊不過其家又法取檀香木橛呪一百八遍將身隨行或所到處險惡道路欲臥之時則一切虎狼師子鳥獸等不敢來侵犯若欲別行還拔此橛所到之處欲臥時還復釘之除一切惡又法取衣帶呪三七遍結之所有惡來向已者皆自停息又法呪五色線七遍一遍一結繫自左臂一切諍競處皆悉得勝又法失物不知去處燒香志心誦呪七遍臥去勿共人語即於夢中神來具説其人姓名亦見其人形狀即知物處不得道説又法呪菖蒲七遍鼻嗅之不睡少眠又法若患蠱毒呪水七遍飲之即得除差又法呪水七遍一切病者服之食飲亦然萬病悉得除差又法若有人欲害己者取鑌鐵刀子呪一百八遍斫彼惡人行路不能為害又法欲求錢財者黑月十四日十五日二日之中日日別三時取烏麻粳米華二種火中燒之一千八遍一遍一燒即得財寶如意又法若人相瞋取烏麻滓與粳米粳相和燒呪之一呪一燒滿一千八遍即皆歡喜又法呪白鴿糞三七遍用塗枷鎖自然解脫又法若人惡心於室中淨澡浴取酒一斗呪三七遍即召惡人隨意更呪一百八遍其人聞酒氣即自然醉又法有諸惡人來者取土呪七遍繞床圍之亦不能加害亦能免一切蚊子又法呪水散四方結界心住其中一切諸惡並不能為害又法若為官府及怨家惡人瞋怒口含嚼菖蒲根心中誦呪當怒誦之即止凡誦呪或對天或陰誦之任意用力皆瞋色勵氣急誦之所為皆驗又法若有惡人急性人諸惡貴人伺求者於淨室中澡浴清淨呪土七遍向四方散則一切惡並息無餘不能為害又法若欲縛賊隨心誦呪見賊之時取衫袂或襟差度七遍急繫手把誦呪而過一切賊盜之人皆悉不動又法若有橫作口舌論人是非取菖蒲根燒作灰呪一百八遍以散人舍其家大小自相鬪諍不休解者取一升井華水呪二十一遍散著其舍即止又法呪刀及杖七遍若行者行夜宿時刀杖畫地周遍一匝一切惡獸盜賊悉不得近又法惡人妄作口舌加諸是非者抄其姓名以帛紙朱書著腳下彼人欲道則不得語欲解之則却腳底名呪之七遍平復如本又法若賊來逼人呪水七遍含水向其方噀之則惡人口鼻脣腹皆似火燒之即止又法凡欲誦呪呪師先禮三寶於是手把香爐住佛前立存念空中幽顯及注想諸天龍八部若欲覺心力有異香宜即誦呪或把楊枝用拂打病人皆得除差又法呪木槵柴火中燒之則一切怨家散又法於清淨地呪粳米飯一日三時滿七日師得種種財寶所求皆得又法呪薰陸香三遍擲火中燒之平旦午時日暮各七遍令人家五穀豐盈又法取牛毛一呪一燒滿一百八遍令人不能近女人每呪一遍稱彼人名即驗又法若治饒舌人以泥作饒舌人形狀桐木作橛呪之一千八遍釘其口中即不得語又法被蛇咬欲死取水一抄呪七遍服之即起若未起更呪咬處二七遍即差又法若頭痛者即香湯洗頭洗手呪手二十一遍捻其痛處即止又法呪油三七遍著耳中即差又法患眼痛取沈水香水洗眼即差又呪三七遍或薰陸香青木香或甘草等物皆煮為湯洗眼況二十一遍悉得除差又法鼠惱人呪灰七遍遺孔前更呪水七遍瀉孔中乃至三日為之鼠出散去絶不來又法欲洗面先取水呪七遍然後洗之一切去處無問貴賤見者皆悉歡喜所求如意又法欲令一切惡人為慈悲心呪飲食三七遍與彼人食變惡作慈心又法取土一把呪三七遍安惡人門下過七日其人變惡作善心又法患瘧發時以水淨楊枝於病人邊誦呪七遍即愈若不信者欲令重發却誦此呪七遍其人即發不能自解又法有患病不語者取狗乳呪七遍用塗其口即得語又法一切瘡等呪蓽茇乾薑和蜜搗之一百八遍用塗瘡上即差又法取乾薑胡椒蓽茇以上物等分為末日別旦起取一方寸匕誦呪二十一遍乾服聰明若患冷病者亦依此服皆差又法若值惡邪魔之所惱亂者迷悶不醒於其耳邊急誦呪三七遍即差又法若患鬼病口不得語以袈裟角呪二十一遍打即語又法取苦楝木葉火燒之呪一百八遍病皆得除差苦楝子亦得又法取苦楝子呪一百八遍燒之則一切惡鬼神悉皆離遠不能與人作障難又法行人遙見一切貴勝一切四衆去七步外誦呪一七遍即生歡喜勿令彼聞欲去人家亦誦二十一遍念念誦之仍稱彼名請善神三寶慈力轉前人善心向已又法若患身體腫用油呪三七遍塗腫上即差又法若患心痛旦起取井華水和石鹽隨多少呪之七遍令病者服之取吐并痛處即差又法患眼膜呪水三七遍洗眼經七日即差又法若患痢者呪鹽水三七遍飲之即差又法若人身上生一切惡瘡者呪土二十一遍和泥瘡上即愈又法若人欲斷穀者取白蠟一方寸許以粳米半升作粥和蠟鎔令調和服之得七日須呪二十一遍服之亦可得三七日不飢又法若有惡狗欲來咬人急誦呪七遍其犬亦不能行若欲解呪七遍望犬散之即解又法若有女人月水不絶日日來者呪粳米洗取汁并和蜜與女人服之亦呪三七遍服即止又法若有女人兒死腹中不出者可取水手中著少許阿魏藥呪一百八遍令服即出又法若人患痔病連年月不差者可取一錢胡粉三錢水銀乾棗七顆去核三物搗碎作丸以一片薄綿裹之內下部不經三日五度即差多作藥者皆等分作之呪三七遍內之即差又人患帶下不可呪赤石脂末飲和為丸曝令乾以飲吞之呪三七遍日二服服則四十丸禁如藥法病者冷多加乾薑亦好各用二分又法若人患脅內生核呪油二十遍塗上即消又法若有刀刺所傷痛不可忍或從高墜下所傷呪淤泥一七遍塗之即差又法若人患白癩黃癩等病若狂狗嚙人若身上生惡瘡若被箭射刀瘡傷破呪土三七遍和泥以塗上皆差真實如是又法呪酥一千八遍用塗眼無睡矣食之不飢又法若人眼患白膜一年以還取蓽茇著水中研之呪二十一遍著眼中即差又法若耳聾呪百八遍若障重者以油及酥煎樺皮青木香每呪七遍過耳中令服之即差又牙痛呪楊枝七遍嚼之即差又法耳痛呪樺皮節塞之即差又法若有女人産逼欲死展髮呪七遍還結之即差若不得食呪水七遍與飲即差又法若患冷病身腫體癖風冷等病取菖蒲以白蜜和之佛前燒香呪一千遍空腹服之即差能令人聰明一部位大七八寸來諸法並是大慈悲觀世音菩薩白佛言世尊此多利心呪功德威德勢不可思議安樂世間多所饒益若四部受持之者一切愛敬得生淨土不離菩薩晝夜誦持我常覆護伏願世尊垂哀聽許我以憐愍一切衆生即説隨心造水天像法以白檀木刻作其像身高五寸似天女形面有三眼頭著天冠身著天衣瓔珞莊嚴以兩手捧如意寶珠身高二寸半亦得造此像已安木函內錦囊盛繫於左臂諸願隨心壇攝一切壇此壇外院方三尺中院方二尺內院方一尺皆須先掘去穢土即著淨土作之香汁作泥令平淨篩石灰以和朱沙赤土或米粉等作蓮華承觀音像若無朱沙即用赤土亦得最內院上四角安四天王座須方畫壇上作唯得燒薰陸香及沈水香先請佛諸菩薩及神王總了即散華訖復座誦呪一百八遍即須發願作善訖更起繞壇三匝訖即更復座誦呪一百八遍至滿一萬遍即起於南門側立呪鉢令轉即知驗先是初受持呪法用若往餘處治病隨念想作也作壇最驗若無澡罐銅鏂亦得具楊枝水中又法用白汁木柴燒灰取粳米胡麻二種搗取少許呪一遍一擲火中燒之滿一千遍一日三時作之則自身增色力又法於日未出時及日沒後以左手撮粳米呪一遍一擲火中燒之一一稱其姓名如是七夜滿一千八遍隨心所念男女皆悉歡喜又法呪酥一遍一擲火中燒之滿七遍則一切禽獸皆悉歸伏欲經惡獸中行先作此法又法取木槵子木柴火中燒之則令一切惡怨家消散亦可準餘法作之又法用白乳汁木柴灰一斗大以酪蜜酥相和用塗松木松明木香柴呪一段一遍擲火中燒之滿二十五遍一日三時及大小便利皆洗浴呪師持八齋戒又云一日三時洗浴一二設食供養日日如是滿七遍隨心所召天神即來隨人使令無敢違者又法白芥子一枚呪一遍一擲火中燒如是滿一千八遍一日三時一切貴勝歸敬又法乳粥和酥呪少許一遍一擲火中燒之如是滿一千八遍則遏羅闍波儞弭歡喜相信餘貴勝妃女亦同此一切求善事皆吉唯不得生染心法不成就又法取阿利瑟迦木本槵是呪一千八遍火中燒之平旦午時日暮一日三時如是三七日呪師得種種財寶又復波浪亦不被溺或能水上行不沒又呪居嚕香三遍擲火中燒之又法於白月八日在清淨地呪粳米飯一撮子呪一遍一擲火中燒之如是滿一千八遍家內五穀常豐盈又法呪菖蒲一百八遍口中含之則一切言論處及官府中理若鬪諍處皆得勝又法呪師欲得供養十方諸佛欲避一切障難除一切病痛者應作此法若知有鬼病者作四肘水壇中心著火爐燒柏樹枝數數誦呪即差日日作到七日即差此多唎呪法觀世音菩薩聖衆誓願力故假令身上五逆七遮等罪但能依法受持行用一切罪障悉皆消滅所作遂心並得成就莫漫傳之受諸惡報畜生地獄之苦又甘露印法左右小指無名指直竪附無名指側上頭開三分許以二頭指㧙中指背上即並二大指屈入掌中並頭拄無名指節文二腕相著次以兩腕跟當心上著向下垂一切疾病皆隨印滅誦呪而慈愍一切受苦飢餓者作心印鬼神歡喜一切皆得飲食飽滿充足大大有驗令一切衆生無諸疾病若常持此法印者便超十地過諸佛剎甚深微妙不可具論是法真言能滅一切罪根若善男子善女人受持此真言者現世得五種果報一者生值世間常有宿命辨才無礙恆得清淨二者令得佛眼三者所生常得三十二相與我無異四者常對佛前五者世間行處皆得震動爾時世尊讚觀世音菩薩言善哉善哉汝為一切衆生令得安樂爾時觀世音菩薩説此真言法竟一切諸大比丘比丘尼優婆塞優婆夷及諸天龍夜叉健闥婆阿素羅伽嚕茶緊那羅一切衆生等聞説此隨心法竟皆大歡喜發無上法忍作禮奉行􅑈􅝪􅁥
